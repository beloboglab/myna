dtype: "bf16"
learning_rate: 1e-6
batch_size: 8
accumulation_steps: 1
grad_clip: 1.0
epochs: 1

# logging
use_swanlab: True
swanlab_project: "Myna-Reasoning-2"
log_interval: 100

# reasoning model
special_token_loss_weight: 10.0
base_model_path: "final/myna_25M_dpo"

# save
save_dir: "/root/autodl-tmp/myna/checkpoints"
save_weight: "reason"
save_interval: 50000
tokenizer_path: "final/myna_25M_reason"
model_path: "final/myna_25M_reason"


# data
data_path: "./datasets/r1_mix_1024.jsonl"
max_seq_len: 720
num_workers: 8


