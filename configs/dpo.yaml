dtype: "bf16"
learning_rate: 4e-8
batch_size: 32
accumulation_steps: 1
grad_clip: 1.0
epochs: 2

# dpo
beta: 0.1

# model
base_model_path: "./final/myna_25M_sft"
ref_model_path: "./final/myna_25M_sft"

# logging
use_swanlab: True
swanlab_project: "Myna-DPO-2"
log_interval: 10

# save
save_dir: "/root/autodl-tmp/myna/dpo/checkpoints"
save_weight: "dpo"
save_interval: 50000
tokenizer_path: "./final/myna_25M_dpo"
model_path: "./final/myna_25M_dpo"

# data
data_path: "./datasets/dpo.jsonl"
max_seq_len: 512
num_workers: 8
