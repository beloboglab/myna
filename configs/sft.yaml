dtype: "bf16"
learning_rate: 1e-6
batch_size: 64
accumulation_steps: 1
grad_clip: 1.0
epochs: 2

# model
base_model_path: "final/myna_25M_pretrain"

# logging
use_swanlab: True
swanlab_project: "Myna-SFT-2"
log_interval: 100

# save
save_dir: "./outputs/checkpoints/sft"
save_weight: "full_sft"
save_interval: 50000
tokenizer_path: "final/myna_25M_sft"
model_path: "final/myna_25M_sft"

# data
data_path: "../minimind/dataset/sft_mini_512.jsonl"
max_seq_len: 512
num_workers: 8